# ─────────────────────────────────────────────────────────────────────────────
# Shared Infrastructure — Plan
#
# Runs on every PR that touches infrastructure/shared/.
# These are bootstrap resources (OIDC provider, GitHub Actions IAM role, SCP)
# shared across all environments — they live outside the dev/prod matrix.
#
# Requires a "shared" GitHub Actions environment with:
#   AWS_ROLE_ARN    — a management role with IAM + Organizations permissions
#   AWS_REGION      — target region
#   TF_STATE_BUCKET — S3 bucket for Terraform state
#
# Note: the management role here needs broader permissions than the
# per-environment GitHub Actions role (IAM write, Organizations, etc.).
# ─────────────────────────────────────────────────────────────────────────────

name: Shared Infra Plan

on:
  pull_request:
    paths:
      - "infrastructure/shared/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan — shared
    runs-on: ubuntu-latest
    environment: shared

    defaults:
      run:
        working-directory: infrastructure/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # ── Gate 1: Format ───────────────────────────────────────────────────────
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Init — shared state is stored under a dedicated key ──────────────────
      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=shared/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -input=false

      # ── Gate 2: Validate ─────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Gate 3: Security Scan ────────────────────────────────────────────────
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/shared/
          soft_fail: true

      # ── Gate 4: Plan ─────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false
        continue-on-error: true

      # ── Post plan to PR ───────────────────────────────────────────────────────
      - name: Post plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan     = '${{ steps.plan.outcome }}';
            const planOutput = process.env.PLAN_OUTPUT;

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### Terraform Plan — \`shared\`

            > ⚠️ These are bootstrap resources shared across all environments (OIDC provider, IAM role, SCP). Review carefully.

            | Gate | Status |
            |---|---|
            | Format | ${icon(fmt)} \`${fmt}\` |
            | Init | ${icon(init)} \`${init}\` |
            | Validate | ${icon(validate)} \`${validate}\` |
            | Plan | ${icon(plan)} \`${plan}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.ref_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
