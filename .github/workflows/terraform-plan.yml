# ─────────────────────────────────────────────────────────────────────────────
# Pattern 1 — Plan / Review / Apply
# Runs on every PR that touches infrastructure or app content.
# Posts the plan output as a PR comment so reviewers can see exactly what
# will change before approving.
#
# Pattern 2 (gates applied here):
#   1. terraform fmt  — style violations caught in seconds
#   2. terraform validate — bad references caught in seconds
#   3. tfsec — security misconfigurations flagged before any resource is created
#   4. terraform plan — full change preview posted to the PR
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"
      - "app/**"

# Permissions required for OIDC token issuance and PR comment posting
permissions:
  id-token: write   # lets GitHub issue an OIDC token
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan — ${{ matrix.environment }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infrastructure/environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Pattern 1: OIDC Authentication ──────────────────────────────────────
      # GitHub exchanges its OIDC token for temporary AWS credentials.
      # No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY stored anywhere.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # ── Gate 1: Format ───────────────────────────────────────────────────────
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      # ── Init (needed before validate/plan) ───────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -input=false

      # ── Gate 2: Validate ─────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Gate 3: Security Scan ────────────────────────────────────────────────
      # tfsec flags security misconfigurations before a single resource is created.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/
          soft_fail: true   # set to false to block PRs on HIGH/CRITICAL findings

      # ── Gate 4: Plan ─────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      # ── Post plan to PR ───────────────────────────────────────────────────────
      - name: Post plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fmt    = '${{ steps.fmt.outcome }}';
            const init   = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan   = '${{ steps.plan.outcome }}';
            const env    = '${{ matrix.environment }}';
            const planOutput = process.env.PLAN_OUTPUT;

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### Terraform Plan — \`${env}\`

            | Gate | Status |
            |---|---|
            | Format | ${icon(fmt)} \`${fmt}\` |
            | Init | ${icon(init)} \`${init}\` |
            | Validate | ${icon(validate)} \`${validate}\` |
            | Plan | ${icon(plan)} \`${plan}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.ref_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
