# ─────────────────────────────────────────────────────────────────────────────
# Shared Infrastructure — Apply
#
# Triggered on merge to main when infrastructure/shared/ changes.
# Applies bootstrap resources: OIDC provider, GitHub Actions IAM role, SCP.
#
# These resources underpin the entire CI/CD pipeline — a misconfiguration here
# can break all environment deployments. It is strongly recommended to add a
# required reviewer to the "shared" GitHub Actions environment so that every
# apply gets a human sign-off before it runs.
# ─────────────────────────────────────────────────────────────────────────────

name: Shared Infra Apply

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/shared/**"

permissions:
  id-token: write
  contents: read

jobs:
  apply-shared:
    name: Apply — shared
    runs-on: ubuntu-latest
    environment: shared   # add a required reviewer here in GitHub settings

    defaults:
      run:
        working-directory: infrastructure/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=shared/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false

      - name: Print outputs
        run: terraform output
