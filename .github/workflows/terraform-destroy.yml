# ─────────────────────────────────────────────────────────────────────────────
# Terraform Destroy — manual trigger only
#
# Destroys all infrastructure for the selected environment.
# Requires typing the environment name as confirmation to prevent accidents.
#
# How to run:
#   GitHub → Actions → "Terraform Destroy" → Run workflow
#   → pick environment, type its name in the confirmation field → Run
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: "Type the environment name to confirm (e.g. dev)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate-confirmation:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation matches environment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "❌ Confirmation input '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'."
            exit 1
          fi
          echo "✅ Confirmation matched. Proceeding with destroy of '${{ github.event.inputs.environment }}'."

  destroy:
    name: Destroy — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.event.inputs.environment }}/website/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="environments/${{ github.event.inputs.environment }}/terraform.tfvars" \
            -auto-approve \
            -input=false
